apiVersion: apps/v1
kind: Deployment
metadata:
  name: locatic-app
  namespace: locatic
  labels:
    app: locatic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locatic
  template:
    metadata:
      labels:
        app: locatic
    spec:
      containers:
        - name: locatic
          image: locatic:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: locatic-config
          volumeMounts:
            - name: sqlite-storage
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
      volumes:
        - name: sqlite-storage
          persistentVolumeClaim:
            claimName: locatic-sqlite-pvc